[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Route everything to index.html (single page app)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
